name: Build and Release NextChange Hub

on:
  push:
    tags:
      - 'v*' # Trigger workflow on version tags, e.g., v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build for Windows, macOS, and Linux
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Make Binaries Executable (Mac/Linux)
        if: matrix.os != 'windows-latest'
        run: chmod +x bin/mac/bitcoin-posd bin/linux/*/bitcoin-posd || true

      - name: Build Vite App
        run: npm run build

      - name: Build & Publish with Electron Builder
        env:
          # This token is automatically provided by GitHub Actions
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
